; ESP32-CAM 审批摄像头固件
; 默认按 AI-Thinker ESP32-CAM 接线。若用其他板子，改下面的 build_flags 里的 CAMERA_MODEL_*。
[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

; 串口波特率。FTDI FT232 一般可稳定跑 921600；若你的线材/转接板传输出错，
; 把这里和 bridge 的 ESP32CAM_BAUD 一起降到 460800 或 115200。
monitor_speed = 921600
upload_speed = 460800

build_flags =
    -DCAMERA_MODEL_AI_THINKER
    -DCORE_DEBUG_LEVEL=0      ; 关掉 Arduino 框架的调试日志，避免污染串口数据流
